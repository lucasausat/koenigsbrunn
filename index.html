<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Königsbrunn | Projekt-Zentrum</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0d1117;
            --primary: #3b82f6;
            --accent: #60a5fa;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(13, 17, 23, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Hintergrund-Grid dezent (vom neuen Design übernommen) */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(var(--primary) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--primary) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.03;
            z-index: -1;
        }

        /* Modernisierte Nav */
        nav { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            padding: 20px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            backdrop-filter: blur(15px); 
            background: var(--glass); 
            border-bottom: 1px solid var(--border); 
            z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--primary); text-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { 
            color: var(--text-muted); 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 500;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }

        /* Hero Bereich - Moderner aber schlicht */
        .hero { 
            height: 80vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 0 10%; 
        }

        .hero h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 20px; }
        .hero p { color: var(--text-muted); max-width: 600px; font-size: 1.1rem; }

        /* Content Sektionen */
        section { padding: 80px 10%; }

        .card {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            transition: transform 0.3s, border-color 0.3s;
        }

        .card:hover {
            border-color: rgba(59, 130, 246, 0.4);
        }

        h2 { font-size: 2rem; margin-bottom: 30px; font-weight: 700; }

        /* Dashboard-Liste vom alten Skript (verbessert) */
        #list { margin-top: 20px; }
        .app-item {
            background: rgba(255,255,255,0.03);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            font-size: 0.9rem;
        }

        .btn { 
            padding: 12px 28px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: 600; 
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }

        /* Wartungsmodus Overlay */
        #maintenance-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="maintenance-screen">
        <div style="text-align: center;">
            <h2 style="color: var(--primary);">System-Upgrade läuft</h2>
            <p style="color: var(--text-muted);">Wir sind am 21.03. um 12:00 Uhr zurück.</p>
        </div>
    </div>

    <div class="grid-bg"></div>

    <nav>
        <div class="logo">KÖNIGS<span>BRUNN</span></div>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#dashboard">Dashboard</a>
            <a href="#status">System-Status</a>
        </div>
    </nav>

    <div id="home" class="hero">
        <h1>Willkommen zurück.</h1>
        <p>Die neue Infrastruktur von Königsbrunn ist nun aktiv. Schneller, stabiler und übersichtlicher.</p>
    </div>

    <section id="dashboard">
        <h2>Dashboard</h2>
        <div class="card">
            <p style="margin-bottom: 20px;">Hier findest du alle aktuellen Informationen zu deinen Projekten.</p>
            <button class="btn btn-primary" onclick="loadApps()">Daten aktualisieren</button>
            <div id="list">
                </div>
        </div>
    </section>

    <script>
        // --- AUTO-SWITCH LOGIK ---
        function checkMaintenance() {
            const now = new Date();
            // Ziel: 21. März 2024, 12:00 Uhr (Achtung: Monat ist 0-basiert, 2 = März)
            // Passe das Jahr an, falls es 2025 sein soll
            const targetDate = new Date(2024, 2, 21, 12, 0, 0); 

            const screen = document.getElementById('maintenance-screen');
            if (now >= targetDate) {
                screen.style.display = 'none'; // Wartungsmodus aus
                document.body.style.overflow = 'auto';
            } else {
                screen.style.display = 'flex'; // Wartungsmodus an
                document.body.style.overflow = 'hidden';
            }
        }

        // Alle 30 Sekunden prüfen oder beim Laden
        setInterval(checkMaintenance, 30000);
        checkMaintenance();


        // --- DASHBOARD LOGIK (Vom alten Skript übernommen) ---
        function loadApps() {
            let list = document.getElementById("list");
            let data = JSON.parse(localStorage.getItem("apps") || "[]");
            list.innerHTML = "";

            if(data.length === 0) {
                list.innerHTML = "<p style='color:var(--text-muted); margin-top:10px;'>Keine Einträge gefunden.</p>";
                return;
            }

            data.reverse().forEach(a => {
                list.innerHTML += `
                <div class="app-item">
                    <b style="color:var(--primary)">${a.discord}</b> | ${a.role}<br>
                    <span style="color:var(--text-muted); font-size:0.8rem;">${a.date}</span>
                </div>`;
            });
        }
    </script>
</body>
</html>
