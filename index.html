<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KÖNIGSBRUNN | OFFICIAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0062ff;
            --secondary: #00e5ff;
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
            --bg-dark: #030508;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 98, 255, 0.2);
            --text-main: #cecece;
            --text-bright: #ffffff;
        }

        /* --- BACKGROUND GLOW --- */
        .bg-glow {
            position: fixed; width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle at 10% 10%, rgba(0, 98, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 229, 255, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        /* --- REDIRECT OVERLAY --- */
        #redirect-overlay {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 50000;
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        
        /* --- COOLER LOADSCREEN --- */
        #fast-load {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 45000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }
        .load-gradient {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--gradient);
            filter: blur(30px);
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.5); opacity: 0.8; } }

        /* --- MOBILE/iOS LOCK --- */
        #mobile-lock {
            display: none; position: fixed; inset: 0; background: #000; z-index: 60000;
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px;
        }
        .lock-icon { font-size: 3rem; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--primary)); }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; position: fixed; width: 100%; z-index: 1000;
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.2rem; color: white; }
        .logo span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- HERO SECTION --- */
        header { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-title { font-family: 'Montserrat', sans-serif; font-size: clamp(3rem, 10vw, 6.5rem); font-weight: 900; line-height: 0.9; color: var(--text-bright); margin-bottom: 25px; }
        .hero-title b { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 40px rgba(0, 98, 255, 0.3); }
        
        .btn-primary { 
            background: var(--gradient); color: #fff; padding: 16px 40px; text-decoration: none; 
            border-radius: 8px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; 
            box-shadow: 0 0 20px rgba(0, 98, 255, 0.4); transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 0 30px rgba(0, 229, 255, 0.6); }

        /* --- LOADER BAR --- */
        .loader-bar { width: 250px; height: 3px; background: rgba(255,255,255,0.05); margin: 20px auto; position: relative; border-radius: 10px; overflow: hidden; }
        .loader-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--gradient); width: 0%; }
        .animate-load { animation: load 5s linear forwards; }
        @keyframes load { to { width: 100%; } }

        .rd-logo { font-family: 'Montserrat', sans-serif; font-size: 2rem; color: white; }
        .rd-p { color: #555; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; margin-top: 10px; }

    </style>
</head>
<body>

<div class="bg-glow"></div>

<div id="mobile-lock">
    <div class="lock-icon">📱</div>
    <h2 style="font-family: 'Montserrat'; color: #fff; letter-spacing: -1px;">DESKTOP ONLY</h2>
    <p style="color: #666; font-size: 0.9rem; margin-top: 10px; max-width: 250px;">Königsbrunn Web ist ein High-End Erlebnis und benötigt einen Desktop-PC oder Laptop.</p>
</div>

<div id="redirect-overlay">
    <div class="rd-logo">WALDERSREUTH <span>➔ KÖNIGSBRUNN</span></div>
    <p class="rd-p">System-Migration läuft</p>
    <div class="loader-bar">
        <div class="loader-fill" id="fill-bar"></div>
    </div>
</div>

<div id="fast-load">
    <div class="load-gradient"></div>
</div>

<nav>
    <div class="logo">KÖNIGS<span>BRUNN</span></div>
</nav>

<header>
    <h1 class="hero-title">NEXT-LEVEL<br><b>ROLEPLAY.</b></h1>
    <a href="https://discord.gg/QX5xj22dGW" class="btn-primary">Projekt Beitreten</a>
</header>

<script>
    const currentUrl = window.location.href;
    const redirectOverlay = document.getElementById('redirect-overlay');
    const fastLoad = document.getElementById('fast-load');
    const fillBar = document.getElementById('fill-bar');
    const mobileLock = document.getElementById('mobile-lock');

    // 1. MOBILE / iOS CHECK
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth < 1024;
    
    if (isMobile) {
        mobileLock.style.display = 'flex';
        fastLoad.style.display = 'none';
    } else {
        // 2. REDIRECT LOGIK
        if (currentUrl.includes("waldersreuth")) {
            fastLoad.style.display = 'none';
            redirectOverlay.style.display = 'flex';
            fillBar.classList.add('animate-load');

            setTimeout(() => {
                window.location.href = "https://lucasausat.github.io/koenigsbrunn-web/";
            }, 5000);
        } else {
            // 3. SCHNELLER LOADSCREEN
            setTimeout(() => {
                fastLoad.style.opacity = '0';
                setTimeout(() => { fastLoad.style.display = 'none'; }, 800);
            }, 1000);
        }
    }
</script>

</body>
</html>
