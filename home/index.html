<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekt Königsbrunn | Home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css">

    <style>
        html {
            scroll-behavior: smooth;
        }

        /* ✨ Micro Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            transition: 0.3s ease;
        }

        /* 🔥 HERO UPGRADE */
        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            background: linear-gradient(90deg, #fff, #aaa, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 6s infinite linear;
        }

        @keyframes shine {
            0% { background-position: -200px; }
            100% { background-position: 200px; }
        }

        .btn-main {
            position: relative;
            overflow: hidden;
        }

        .btn-main::before {
            content: "";
            position: absolute;
            width: 120%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
            top: 0;
            left: -120%;
            transition: 0.5s;
        }

        .btn-main:hover::before {
            left: 100%;
        }

        /* NAV HOVER */
        .nav-links a {
            position: relative;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: white;
            left: 0;
            bottom: -4px;
            transition: 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* HERO FIX */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 100px 20px;
            z-index: 10;
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .hero h1,
        .hero p,
        .hero .stats,
        .hero .btn {
            position: relative;
            z-index: 11;
        }

        .hero p {
            opacity: 0.8;
            max-width: 500px;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.6));
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
        }

        /* PARTICLES */
        #particles {
            position: fixed;
            z-index: -10;
            pointer-events: none;
        }

        /* DISCORD UPGRADE */
        .discord-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.02);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .discord-text {
            max-width: 400px;
        }

        /* SCROLL BAR */
        #scroll-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            width: 0%;
            background: white;
            z-index: 9999;
        }

        /* 📱 MOBILE MENU */
        .menu-toggle {
            display: none;
            font-size: 28px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .nav-links {
                position: absolute;
                top: 70px;
                right: 20px;
                background: #111;
                padding: 20px;
                border-radius: 12px;
                display: none;
                flex-direction: column;
                gap: 10px;
            }

            .nav-links.active {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }
        }

        /* 📱 MOBILE MAINTENANCE */
        .mobile-maintenance {
            display: none;
        }

        @media (max-width: 768px) {

            body {
                background: #000;
            }

            nav,
            section,
            footer,
            canvas,
            #scroll-bar,
            .bg-glow {
                display: none !important;
            }

            .mobile-maintenance {
                display: flex;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #000;
                color: white;
                z-index: 999999;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                text-align: center;
                padding: 20px;
            }

            .mobile-maintenance h1 {
                font-size: 2.5rem;
                background: linear-gradient(90deg, #fff, #aaa, #fff);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                animation: shine 6s infinite linear;
            }

            .mobile-maintenance p {
                opacity: 0.7;
                max-width: 300px;
                margin-top: 10px;
            }

            .mobile-maintenance .btn {
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>

<!-- 📱 MOBILE SCREEN -->
<div class="mobile-maintenance">
    <h1>Königs<br><b>Brunn</b></h1>
    <p>
        Die mobile Version befindet sich aktuell im Aufbau.  
        Komm später wieder oder nutze einen PC.
    </p>

    <a href="https://discord.gg/DM2Au3f6RS" class="btn btn-main">
        Discord öffnen
    </a>
</div>

<div id="scroll-bar"></div>

<div class="bg-glow" id="mouse-glow"></div>
<canvas id="particles"></canvas>

<nav>
    <div class="logo" onclick="window.location.href='./'">Königs<b>brunn</b></div>
    <div class="nav-right">
        <div class="menu-toggle" id="menu-toggle">☰</div>
        <div class="nav-links" id="nav-links">
            <a href="./">Home</a>
            <a href="../team.html">Team</a>
            <a href="../tos.html">ToS</a>
            <a href="#features">Systeme</a>
        </div>
        <button id="theme-toggle">Light Mode</button>
    </div>
</nav>
